<header class="app-header" *ngIf="!isHeaderHidden">
  <div class="header-left">
    <a (click)="onHomeClick()" class="tumblr-logo" style="cursor: pointer;">
      <img src="assets/images/Blog_mang_logo.png" alt="DP Blog Logo" class="logo-image" />
      <span class="logo-text">Feel free</span>
    </a>
    <div class="search-bar search-wrapper" *ngIf="showSearch">
      <input 
        type="text"
        class="search-input"
        placeholder="Search users..."
        [(ngModel)]="searchText"
        (input)="searchUsers()"
        (focus)="onSearchFocus()"
        (blur)="onSearchBlur()"
      />
      <span class="search-icon">𓍯𓂃𓏧♡</span>
      <div class="search-dropdown" *ngIf="showSearchDropdown">
        <div class="search-dropdown-list">
          <a *ngFor="let u of usersList" class="search-dropdown-item" (click)="selectUser(u); $event.preventDefault()" href="">
            <img [src]="u.profileImageUrl || u.profilePic || 'assets/images/dp_profile.jpeg'" [alt]="u.username" class="search-dropdown-pic" onerror="this.src='assets/images/dp_profile.jpeg'" />
            <div class="search-dropdown-info">
              <span class="search-dropdown-name">{{ u.fullName || u.username || 'User' }}</span>
              <span class="search-dropdown-username">{{ u.username }}</span>
            </div>
          </a>
          <p class="search-dropdown-empty" *ngIf="usersList.length === 0">No users found.</p>
        </div>
      </div>
    </div>

  </div>
  <div class="header-right">
    <ng-container *ngIf="isAuthenticated">
      <button
        type="button"
        class="chat-header-btn"
        (click)="toggleChat()"
        title="Messages"
        aria-label="Open messages"
      >
        <svg class="chat-header-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path
            fill="currentColor"
            d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm0 14H5.17L4 17.17V4h16v12z"
          />
        </svg>
        <span class="chat-unread-badge" *ngIf="chatUnreadCount > 0">{{ chatUnreadCount > 99 ? '99+' : chatUnreadCount }}</span>
      </button>
      <a routerLink="/random-chat" class="anon-header-link" title="Anonymous map & random chat"
        >Finder</a>
      <button class="new-post-btn-text" (click)="onNewPostClick()">New Post
      </button>
      <div class="notification-wrap" #notificationWrap>
        <button
          type="button"
          class="chat-header-btn notification-bell-btn"
          (click)="toggleNotifications($event)"
          title="Notifications"
          aria-label="Notifications"
          [attr.aria-expanded]="notificationsOpen"
        >
          <svg class="chat-header-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"
            />
          </svg>
          <span class="chat-unread-badge" *ngIf="notificationUnreadCount > 0">{{
            notificationUnreadCount > 99 ? '99+' : notificationUnreadCount
          }}</span>
        </button>
        <div class="notification-dropdown" *ngIf="notificationsOpen" (click)="$event.stopPropagation()">
          <div class="notification-dropdown-header">
            <span>Notifications</span>
            <button
              type="button"
              class="notification-mark-all"
              *ngIf="notificationUnreadCount > 0"
              (click)="markAllNotificationsRead()"
            >
              Mark all read
            </button>
          </div>
          <div class="notification-dropdown-body">
            <p class="notification-loading" *ngIf="notificationsLoading">Loading…</p>
            <p class="notification-empty" *ngIf="!notificationsLoading && notifications.length === 0">
              No notifications yet.
            </p>
            <button
              type="button"
              class="notification-item"
              *ngFor="let n of notifications"
              [class.unread]="!n.read"
              (click)="onNotificationRowClick(n, $event)"
            >
              <img
                class="notification-avatar"
                [src]="n.actorProfileImageUrl || 'assets/images/dp_profile.jpeg'"
                alt=""
                onerror="this.src='assets/images/dp_profile.jpeg'"
              />
              <div class="notification-text">
                <span>{{ notificationSummary(n) }}</span>
                <time *ngIf="n.createdAt">{{ n.createdAt | date : 'short' }}</time>
              </div>
            </button>
          </div>
        </div>
      </div>
      <img [src]="headerProfileSrc()"
        alt="Profile" class="user-profile-pic" (click)="onProfileClick()"
        onerror="this.src='assets/images/dp_profile.jpeg'" />
      <button class="logout-btn" (click)="onLogoutClick()">Logout</button>
    </ng-container>
  </div>
</header>
<app-chat-panel
  *ngIf="isAuthenticated"
  [open]="chatOpen"
  (openChange)="onChatOpenChange($event)"
  (unreadCountChange)="chatUnreadCount = $event"
></app-chat-panel>
