<header class="app-header" *ngIf="!isHeaderHidden">
  <div class="header-left">
    <a (click)="onHomeClick()" class="tumblr-logo" style="cursor: pointer;">
      <img src="assets/images/Blog_mang_logo.png" alt="DP Blog Logo" class="logo-image" />
      <span class="logo-text">Feel free</span>
    </a>
    <div class="search-bar search-wrapper" *ngIf="showSearch">
      <input 
        type="text"
        class="search-input"
        placeholder="Search users..."
        [(ngModel)]="searchText"
        (input)="searchUsers()"
        (focus)="onSearchFocus()"
        (blur)="onSearchBlur()"
      />
      <span class="search-icon">𓍯𓂃𓏧♡</span>
      <div class="search-dropdown" *ngIf="showSearchDropdown">
        <div class="search-dropdown-list">
          <a *ngFor="let u of usersList" class="search-dropdown-item" (click)="selectUser(u); $event.preventDefault()" href="">
            <img [src]="u.profileImageUrl || u.profilePic || 'assets/images/dp_profile.jpeg'" [alt]="u.username" class="search-dropdown-pic" onerror="this.src='assets/images/dp_profile.jpeg'" />
            <div class="search-dropdown-info">
              <span class="search-dropdown-name">{{ u.fullName || u.username || 'User' }}</span>
              <span class="search-dropdown-username">{{ u.username }}</span>
            </div>
          </a>
          <p class="search-dropdown-empty" *ngIf="usersList.length === 0">No users found.</p>
        </div>
      </div>
    </div>

  </div>
  <div class="header-right">
    <ng-container *ngIf="isAuthenticated">
      <button
        type="button"
        class="chat-header-btn"
        (click)="toggleChat()"
        title="Messages"
        aria-label="Open messages"
      >
        <svg class="chat-header-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path
            fill="currentColor"
            d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm0 14H5.17L4 17.17V4h16v12z"
          />
        </svg>
        <span class="chat-unread-badge" *ngIf="chatUnreadCount > 0">{{ chatUnreadCount > 99 ? '99+' : chatUnreadCount }}</span>
      </button>
      <button class="new-post-btn-text" (click)="onNewPostClick()">New Post
      </button>
      <span class="notification-bell">`♡´</span>
      <img [src]="currentUser?.profilePic || currentUser?.profileImageUrl || 'assets/images/dp_profile.jpeg'"
        alt="Profile" class="user-profile-pic" (click)="onProfileClick()"
        onerror="this.src='assets/images/dp_profile.jpeg'" />
      <button class="logout-btn" (click)="onLogoutClick()">Logout</button>
    </ng-container>
  </div>
</header>
<app-chat-panel
  *ngIf="isAuthenticated"
  [open]="chatOpen"
  (openChange)="onChatOpenChange($event)"
  (unreadCountChange)="chatUnreadCount = $event"
></app-chat-panel>
