apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-moderation-worker-hpa
  namespace: ai-safety
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-moderation-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
