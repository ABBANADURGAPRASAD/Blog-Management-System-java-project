apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-moderation-api
  namespace: ai-safety
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-moderation-api
  template:
    metadata:
      labels:
        app: ai-moderation-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/ai-moderation:latest
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: ai-moderation-config
          env:
            - name: INTERNAL_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-moderation-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8090
            initialDelaySeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: ai-moderation-api
  namespace: ai-safety
spec:
  selector:
    app: ai-moderation-api
  ports:
    - port: 8090
      targetPort: 8090
  type: ClusterIP
