apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-moderation-config
  namespace: ai-safety
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka.ai-safety.svc.cluster.local:9092"
  KAFKA_REQUEST_TOPIC: "moderation.requested"
  KAFKA_COMPLETED_TOPIC: "moderation.completed"
  KAFKA_DLQ_TOPIC: "moderation.dlq"
  REDIS_URL: "redis://redis.ai-safety.svc.cluster.local:6379/0"
  MODEL_BUNDLE_VERSION: "1.0.0"
  AI_DEVICE: "cpu"
