# AI Moderation local stack — from Backend/ai-support/docker
# Usage: cp .env.example .env && docker compose up -d

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  moderation-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moderation_db
      POSTGRES_USER: moderation
      POSTGRES_PASSWORD: moderation
    ports:
      - "5433:5432"
    volumes:
      - ../database/schema.postgresql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"

  ai-moderation-api:
    build:
      context: ../python-ai-service
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-secret}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      KAFKA_ENABLED: "false"
    depends_on:
      - kafka
      - redis

  ai-moderation-worker:
    build:
      context: ../python-ai-service
      dockerfile: Dockerfile
    command: python -m app.workers.kafka_consumer
    environment:
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-secret}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      KAFKA_ENABLED: "true"
    depends_on:
      - kafka
      - redis
      - ai-moderation-api

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
