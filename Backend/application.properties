# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/blog_db
spring.datasource.username=root
# Use encrypted password by providing: spring.datasource.password.encrypted=<encrypted_value>
# Or use plain password (less secure): spring.datasource.password=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Encrypted database credentials (use GenerateEncryptedSecrets tool to generate)
# Uncomment and replace with your encrypted values:
# spring.datasource.password.encrypted=<your_encrypted_password_here>
# spring.datasource.username.encrypted=<your_encrypted_username_here>

# ===============================
# HIBERNATE (JPA) CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# EMAIL CONFIGURATION (SMTP for Sending Emails)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=abbanadurgaprasad9390@gmail.com
# Use encrypted mail password: spring.mail.password.encrypted=<encrypted_value>
# Or use plain password (less secure): spring.mail.password=<your_password>
spring.mail.password=prasad9390
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Encrypted mail credentials (use GenerateEncryptedSecrets tool to generate)
# Uncomment and replace with your encrypted values:
# spring.mail.password.encrypted=<your_encrypted_mail_password_here>
# spring.mail.username.encrypted=<your_encrypted_mail_username_here>

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# SECRET KEY CONFIGURATION
# ===============================
# Secret key file path (optional, defaults to /etc/myapp/secret.key or APP_SECRET_KEY env var)
# secret.key.file.path=/path/to/your/secret.key

# ===============================
# JWT SECRET (if using JWT authentication)
