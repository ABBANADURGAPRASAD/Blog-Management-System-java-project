# Use encrypted JWT secret: jwt.secret.encrypted=<encrypted_value>
# Or use plain secret (less secure): jwt.secret=<your_secret>
# jwt.secret=your-jwt-secret-here
# jwt.secret.encrypted=<your_encrypted_jwt_secret_here>

# ===============================
